# configs/phl_geoconv_regression.yaml

task: train        # "train", "validate", "explain", "continue_training", etc.

experiment_name: "usaid_dhs_poor_10samps"
output_dir: "/scratch/hbaier/new_data/usaid_dhs/artifacts/africa_poor_10samps_v2"

dataset:
  type: json                   # maps to JSONGeoAdapter via DatasetRegistry
  data_root: "/scratch/hbaier/new_data/usaid_dhs/imagery_10samps/"
  prefix: "pct_improved_water_africa_10samps"
  batch_size: 64
  img_size: [256, 256]
  num_workers: 0
  seed: 1337
  temporal: False

model:
  name: geoconv                # maps to GeoConvNativeRegressor via ModelRegistry
  # params:
  #   weights: "IMAGENET1K_V1"

trainer:
  epochs: 200
  lr: .00001
  device: "cuda"
  # save_every: 1
  eval_every: 1
  early_stop: null             # or {patience: 3, metric: "val_rmse"}
