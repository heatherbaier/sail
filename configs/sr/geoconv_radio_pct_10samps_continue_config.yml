# configs/phl_geoconv_regression.yaml

task: continue_training        # "train", "validate", "explain", "continue_training", etc.

experiment_name: "africa_radio_pct_10samps"
output_dir: "/data/hbaier/new_data/usaid_dhs/artifacts/africa_radio_pct_10samps_v1"

dataset:
  type: json                   # maps to JSONGeoAdapter via DatasetRegistry
  data_root: "/data/hbaier/new_data/usaid_dhs/imagery_10samps/"
  prefix: "radio_pct_africa_10samps"
  batch_size: 64
  img_size: [256, 256]
  num_workers: 0
  seed: 1337
  temporal: False
  write_files: False

model:
  name: geoconv                # maps to GeoConvNativeRegressor via ModelRegistry
  # params:
  #   weights: "IMAGENET1K_V1"

trainer:
  epochs: 200
  lr: .00001
  device: "cuda"
  # save_every: 1
  eval_every: 1
  early_stop: null             # or {patience: 3, metric: "val_rmse"}
