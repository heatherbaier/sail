# configs/phl_geoconv_regression.yaml
task: validate        # "train", "validate", "explain", etc.

experiment_name: "avg_time_to_water_min_africa_10samps"
output_dir: "/data/hbaier/new_data/usaid_dhs/artifacts/avg_time_to_water_min_africa_10samps_v1/"

dataset:
  type: json                   # maps to JSONGeoAdapter via DatasetRegistry
  data_root: "/scratch/hbaier/new_data/usaid_dhs/imagery_10samps/"
  prefix: "avg_time_to_water_min_africa_10samps"
  img_size: [256, 256]
  num_workers: 0
  seed: 1337
  temporal: False
  
model:
  name: geoconv                # maps to GeoConvNativeRegressor via ModelRegistry

validator:
  device: "cuda"