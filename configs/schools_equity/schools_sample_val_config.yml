# configs/phl_geoconv_regression.yaml
task: validate        # "train", "validate", "explain", etc.

experiment_name: "schools_equity_samp_v1"
output_dir: "/data/hbaier/new_data/us_schools/artifacts/"

dataset:
  type: json                   # maps to JSONGeoAdapter via DatasetRegistry
  data_root: "/data/hbaier/new_data/us_schools/imagery/"
  prefix: "us_schools"
  img_size: [256, 256]
  num_workers: 0
  seed: 1337
  temporal: False
  
model:
  name: coordConv                # maps to GeoConvNativeRegressor via ModelRegistry

validator:
  device: "cuda"